name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: lenovo-self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Create local.properties from ANDROID_HOME
        run: $p=$env:ANDROID_HOME.Trim(); $p=$p.Replace('\','/'); "sdk.dir=$p" | Out-File -FilePath android\local.properties -Encoding utf8
        shell: powershell

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build debug APK
        run: .\gradlew.bat assembleDebug --build-cache --parallel
        working-directory: android
        shell: cmd
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build release APK
        run: .\gradlew.bat assembleRelease --build-cache --parallel
        working-directory: android
        shell: cmd
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Get version from tag
        id: version
        run: echo "version=$($env:GITHUB_REF_NAME -replace '^v','')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: powershell

      - name: Rename APKs
        run: |
          copy "app\build\outputs\apk\debug\app-debug.apk" "app\build\outputs\apk\debug\khata_$($env:VERSION)-debug.apk"
          copy "app\build\outputs\apk\release\app-release.apk" "app\build\outputs\apk\release\khata_$($env:VERSION)-release.apk"
          remove-item "app\build\outputs\apk\debug\app-debug.apk"
          remove-item "app\build\outputs\apk\release\app-release.apk"
        shell: powershell
        working-directory: android
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Khata ${{ steps.version.outputs.version }}
          body: |
            ## Khata Android App v${{ steps.version.outputs.version }}

            ### Installation
            Download the APK below and install it on your Android device.
            You may need to enable "Install from unknown sources" in Settings.

            ### Changelog
            See the commits in this release for details.
          files: |
            android/app/build/outputs/apk/debug/khata_${{ steps.version.outputs.version }}-debug.apk
            android/app/build/outputs/apk/release/khata_${{ steps.version.outputs.version }}-release.apk